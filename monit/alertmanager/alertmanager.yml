route:
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default

  routes:
    - matchers: [severity="critical"]
      receiver: critical
      repeat_interval: 1h

receivers:
