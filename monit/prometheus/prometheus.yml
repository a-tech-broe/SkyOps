global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    app: skyops
    env: production

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:

  # ── SkyOps backend app metrics (app EC2 :3001/metrics) ─────────
  - job_name: skyops-backend
    metrics_path: /metrics
    static_configs:
      - targets: [APP_EC2_IP:3001]
        labels:
          instance: skyops-app

  # ── System metrics — node-exporter on app EC2 ──────────────────
  - job_name: node-exporter
    static_configs:
      - targets: [APP_EC2_IP:9100]
        labels:
          instance: skyops-app

  # ── Container metrics — cAdvisor on app EC2 ────────────────────
  - job_name: cadvisor
    metrics_path: /metrics
    static_configs:
      - targets: [APP_EC2_IP:8082]
        labels:
          instance: skyops-app
    metric_relabel_configs:
      - source_labels: [container_label_com_docker_compose_service]
        target_label: service
      - regex: container_label_.+
        action: labeldrop

  # ── Prometheus self-monitoring ──────────────────────────────────
  - job_name: prometheus
    metrics_path: /metrics
    static_configs:
      - targets: [localhost:9090]

  # ── Blackbox endpoint probing ───────────────────────────────────
  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://APP_DOMAIN/health
          - https://APP_DOMAIN
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115
