server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: ${LOKI_URL}/loki/api/v1/push

scrape_configs:

  # ── Container logs (via Docker socket SD) ───────────────────────────
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: status
            values: [running]
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: project
      - replacement: skyops-app
        target_label: host

  # ── OS / system logs ─────────────────────────────────────────────────
  - job_name: system
    static_configs:
      - targets: [localhost]
        labels:
          job: system
          host: skyops-app
          __path__: /var/log/{messages,secure,cloud-init.log}
