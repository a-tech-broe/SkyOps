version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: skyops
      POSTGRES_USER: skyops
      POSTGRES_PASSWORD: skyops_dev
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./backend/src/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skyops"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_URL: postgresql://skyops:skyops_dev@db:5432/skyops
      FAA_CLIENT_ID: ${FAA_CLIENT_ID:-}
      FAA_CLIENT_SECRET: ${FAA_CLIENT_SECRET:-}
    volumes:
      - ./backend/src:/app/src
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    environment:
      VITE_API_URL: http://localhost:3001
    volumes:
      - ./web/src:/app/src
      - ./web/index.html:/app/index.html
    ports:
      - "5173:5173"
    depends_on:
      - backend

  mobile:
    build:
      context: ./mobile
      dockerfile: Dockerfile.dev
    environment:
      EXPO_PUBLIC_API_URL: http://localhost:3001
    volumes:
      - ./mobile/src:/app/src
      - ./mobile/App.tsx:/app/App.tsx
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
    network_mode: host

volumes:
  postgres_data_dev:
