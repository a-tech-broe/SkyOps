name: CD — Build · Infra · Deploy

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      push:
        description: 'Push images to Docker Hub'
        type: boolean
        default: true

permissions:
  contents: read
  security-events: write
  id-token: write
  packages: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── 1. Secret scan ────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Run Gitleaks
        run: gitleaks detect --source . --verbose --redact --log-level warn

  # ── 2. SAST ───────────────────────────────────────────────────────
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          if [ -n "$SEMGREP_APP_TOKEN" ]; then
            semgrep ci --sarif --output=semgrep.sarif
          else
            semgrep scan --config=auto --sarif --output=semgrep.sarif
          fi
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ── 3. Dependency audit — stricter in prod ────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Audit backend
        run: cd app/backend && npm ci && npm audit --audit-level=high

      - name: Audit web
        run: cd app/web && npm ci && npm audit --audit-level=high

  # ── 4. Build · push · scan · sign per service ────────────────────
  build-push:
    name: Build · Push · Sign (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [secret-scan, sast, audit]
    strategy:
      fail-fast: false
      matrix:
        service: [backend, web]

    outputs:
      backend-digest: ${{ steps.build.outputs.digest }}
      web-digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/skybroe-${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=SkyBroe ${{ matrix.service }}
            org.opencontainers.image.description=Aviation tools for GA pilots
            org.opencontainers.image.vendor=SkyBroe
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./app/${{ matrix.service }}
          file: ./app/${{ matrix.service }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=${{ matrix.service }}-prod
          cache-to: type=gha,scope=${{ matrix.service }}-prod,mode=max

      - name: Trivy image scan
        id: trivy-image
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/skybroe-${{ matrix.service }}@${{ steps.build.outputs.digest }}
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true
          format: sarif
          output: trivy-image-${{ matrix.service }}.sarif

      - name: Ensure image SARIF valid
        if: always()
        run: |
          FILE="trivy-image-${{ matrix.service }}.sarif"
          jq -e '.runs | length > 0' "$FILE" > /dev/null 2>&1 || \
            echo '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"Trivy","version":"0.0.0","informationUri":"https://github.com/aquasecurity/trivy","rules":[]}},"results":[]}]}' > "$FILE"

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image-${{ matrix.service }}.sarif
          category: trivy-image-${{ matrix.service }}

      - name: Warn on scan findings
        if: steps.trivy-image.outcome == 'failure'
        run: echo "::warning::Trivy found vulnerabilities in skybroe-${{ matrix.service }}. Review Security → Code scanning."

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless OIDC)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}
        run: |
          cosign sign --yes \
            "${{ secrets.DOCKERHUB_USERNAME }}/skybroe-${{ matrix.service }}@${{ steps.build.outputs.digest }}"
        env:
          COSIGN_EXPERIMENTAL: '1'

      - name: Generate SBOM
        uses: anchore/sbom-action@v0.18.0
        continue-on-error: true
        with:
          image: ${{ secrets.DOCKERHUB_USERNAME }}/skybroe-${{ matrix.service }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          artifact-name: sbom-${{ matrix.service }}-${{ github.sha }}.spdx.json
          upload-artifact: true
          upload-release-assets: true

  # ── 5. Infra apply — provision / update EC2 ──────────────────────
  infra-apply:
    name: Infra Apply (Terraform)
    runs-on: ubuntu-latest
    needs: [build-push]
    defaults:
      run:
        working-directory: infra/terraform
    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION:    ${{ secrets.AWS_REGION || 'us-east-1' }}
      TF_VAR_dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
      TF_VAR_key_name: keyit
      TF_VAR_domain_name: ${{ secrets.APP_DOMAIN }}
      TF_VAR_hosted_zone_id: ${{ secrets.HOSTED_ZONE_ID }}
      TF_VAR_app_eip: ${{ secrets.EC2_HOST }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.8.5'

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" \
            -backend-config="key=ec2/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION || 'us-east-1' }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_BACKEND_DYNAMO_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Clear blackhole default route
        run: |
          REGION="${{ secrets.AWS_REGION || 'us-east-1' }}"
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=isDefault,Values=true" \
            --query "Vpcs[0].VpcId" --output text --region "$REGION")
          RTB_ID=$(aws ec2 describe-route-tables \
            --filters "Name=vpc-id,Values=$VPC_ID" "Name=association.main,Values=true" \
            --query "RouteTables[0].RouteTableId" --output text --region "$REGION")
          aws ec2 delete-route --route-table-id "$RTB_ID" \
            --destination-cidr-block 0.0.0.0/0 --region "$REGION" \
            && echo "Stale route removed" || echo "No conflicting route"

      - name: Import existing AWS resources into state
        # The cleanup workflow destroys only the cost-incurring EC2 instance
        # and ALB; everything tagged do_not_delete=true (networking, IAM, and
        # the whole observability stack) survives. If the Terraform state was
        # also wiped, those survivors must be re-imported here before apply,
        # otherwise apply tries to *create* resources that already exist and
        # fails with AlreadyExists. Keep this list in sync with the protected
        # resources in main.tf / alb.tf / monitoring.tf.
        run: |
          REGION="${{ secrets.AWS_REGION || 'us-east-1' }}"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          tf_import_if_missing() {
            local resource=$1 id=$2
            if terraform state show "$resource" > /dev/null 2>&1; then
              echo "$resource already in state — skipping import"
            else
              terraform import "$resource" "$id" \
                || echo "Import of $resource failed — may not exist yet"
            fi
          }

          # ── IAM — EC2 role (inline policies + managed attachments) ───
          tf_import_if_missing aws_iam_role.skybroe_ec2 skybroe-ec2-role
          tf_import_if_missing aws_iam_instance_profile.skybroe_ec2 skybroe-ec2-profile
          tf_import_if_missing aws_iam_role_policy.ssm_read skybroe-ec2-role:skybroe-ssm-read
          tf_import_if_missing aws_iam_role_policy.ses_send skybroe-ec2-role:skybroe-ses-send
          tf_import_if_missing aws_iam_role_policy_attachment.cw_agent \
            "skybroe-ec2-role/arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy"
          tf_import_if_missing aws_iam_role_policy_attachment.xray \
            "skybroe-ec2-role/arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess"

          # ── IAM — RUM unauthenticated guest role ────────────────────
          tf_import_if_missing aws_iam_role.rum_unauth skybroe-rum-unauth
          tf_import_if_missing aws_iam_role_policy.rum_unauth \
            skybroe-rum-unauth:skybroe-rum-unauth-policy

          # ── Security groups (app + ALB; both protected, survive) ────
          SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=skybroe-sg" \
            --query "SecurityGroups[0].GroupId" --output text --region "$REGION" 2>/dev/null || true)
          [ -n "$SG_ID" ] && [ "$SG_ID" != "None" ] && \
            tf_import_if_missing aws_security_group.skybroe "$SG_ID"

          ALB_SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=skybroe-alb-sg" \
            --query "SecurityGroups[0].GroupId" --output text --region "$REGION" 2>/dev/null || true)
          [ -n "$ALB_SG_ID" ] && [ "$ALB_SG_ID" != "None" ] && \
            tf_import_if_missing aws_security_group.alb "$ALB_SG_ID"

          # ── Target groups (protected, survive; ALB itself is recreated)
          for pair in "web:skybroe-web-tg" "backend:skybroe-api-tg"; do
            ADDR="aws_lb_target_group.${pair%%:*}"
            TG_NAME="${pair##*:}"
            TG_ARN=$(aws elbv2 describe-target-groups --names "$TG_NAME" \
              --query "TargetGroups[0].TargetGroupArn" --output text --region "$REGION" 2>/dev/null || true)
            [ -n "$TG_ARN" ] && [ "$TG_ARN" != "None" ] && \
              tf_import_if_missing "$ADDR" "$TG_ARN"
          done

          # ── EC2 instance (skybroe-app) ───────────────────────────────
          APP_INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=skybroe-app" \
                      "Name=instance-state-name,Values=running,stopped" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text --region "$REGION" 2>/dev/null || true)
          [ -n "$APP_INSTANCE_ID" ] && [ "$APP_INSTANCE_ID" != "None" ] && \
            tf_import_if_missing aws_instance.skybroe "$APP_INSTANCE_ID"

          # ── EIP association ─────────────────────────────────────────
          APP_ASSOC_ID=$(aws ec2 describe-addresses \
            --filters "Name=public-ip,Values=$TF_VAR_app_eip" \
            --query "Addresses[0].AssociationId" --output text --region "$REGION" 2>/dev/null || true)
          [ -n "$APP_ASSOC_ID" ] && [ "$APP_ASSOC_ID" != "None" ] && \
            tf_import_if_missing aws_eip_association.skybroe "$APP_ASSOC_ID"

          # ── Remove legacy managed EIP from state (now a data source) ─
          # Historical entry predates the skybroe rename, so target the old
          # address to purge any stale state.
          if terraform state show aws_eip.skyops > /dev/null 2>&1; then
            terraform state rm aws_eip.skyops
            echo "Removed legacy aws_eip.skyops from state"
          fi

          # ── Internet gateway — now an unmanaged data source ─────────
          # The default VPC's IGW is referenced via data source, not created.
          # Drop any previously-imported (and possibly tainted/detached)
          # legacy managed entry so Terraform stops trying to replace it.
          if terraform state show aws_internet_gateway.skyops > /dev/null 2>&1; then
            terraform state rm aws_internet_gateway.skyops
            echo "Removed legacy aws_internet_gateway.skyops from state (now a data source)"
          fi

          # ── Observability — SNS / logs / S3 / SSM ───────────────────
          tf_import_if_missing aws_sns_topic.alerts "arn:aws:sns:${REGION}:${ACCOUNT_ID}:skybroe-alerts"
          tf_import_if_missing aws_cloudwatch_log_group.app /skybroe/app
          tf_import_if_missing aws_cloudwatch_log_group.system /skybroe/system
          tf_import_if_missing aws_ssm_parameter.cw_agent_config /skybroe/cloudwatch-agent-config

          BUCKET="skybroe-alb-logs-${ACCOUNT_ID}"
          if aws s3api head-bucket --bucket "$BUCKET" --region "$REGION" 2>/dev/null; then
            tf_import_if_missing aws_s3_bucket.alb_logs "$BUCKET"
            tf_import_if_missing aws_s3_bucket_lifecycle_configuration.alb_logs "$BUCKET"
            tf_import_if_missing aws_s3_bucket_policy.alb_logs "$BUCKET"
          fi

          # ── Observability — RUM + Cognito guest access ──────────────
          tf_import_if_missing aws_rum_app_monitor.skybroe skybroe-web

          POOL_ID=$(aws cognito-identity list-identity-pools --max-results 60 \
            --query "IdentityPools[?IdentityPoolName=='skybroe_rum'].IdentityPoolId | [0]" \
            --output text --region "$REGION" 2>/dev/null || true)
          if [ -n "$POOL_ID" ] && [ "$POOL_ID" != "None" ]; then
            tf_import_if_missing aws_cognito_identity_pool.rum "$POOL_ID"
            tf_import_if_missing aws_cognito_identity_pool_roles_attachment.rum "$POOL_ID"
          fi

          # ── Observability — CloudWatch alarms + dashboard ───────────
          tf_import_if_missing aws_cloudwatch_metric_alarm.cpu_high      skybroe-cpu-high
          tf_import_if_missing aws_cloudwatch_metric_alarm.memory_high   skybroe-memory-high
          tf_import_if_missing aws_cloudwatch_metric_alarm.disk_high     skybroe-disk-high
          tf_import_if_missing aws_cloudwatch_metric_alarm.alb_5xx       skybroe-alb-5xx
          tf_import_if_missing aws_cloudwatch_metric_alarm.alb_latency   skybroe-alb-latency
          tf_import_if_missing aws_cloudwatch_metric_alarm.alb_unhealthy skybroe-alb-unhealthy-hosts
          tf_import_if_missing aws_cloudwatch_dashboard.skybroe SkyBroe-Overview

          # ── SES — domain identity for transactional email ──────────
          tf_import_if_missing aws_sesv2_email_identity.domain "$TF_VAR_domain_name"

      - name: Terraform Plan
        run: terraform plan -out=tfplan -input=false

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false tfplan

      - name: Wait for EC2 instance to pass status checks
        run: |
          REGION="${{ secrets.AWS_REGION || 'us-east-1' }}"
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=skybroe-app" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text --region "$REGION")
          echo "Waiting for instance $INSTANCE_ID to pass status checks..."
          aws ec2 wait instance-status-ok --instance-ids "$INSTANCE_ID" --region "$REGION"
          echo "Instance is ready"

      - name: Terraform Outputs
        id: tf-outputs
        run: terraform output

  # ── 6. Deploy — write .env + restart containers ──────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [infra-apply]

    steps:
      - name: Wait for SSH to be ready
        run: |
          for i in $(seq 1 24); do
            nc -z -w5 "${{ secrets.EC2_HOST }}" 22 && echo "SSH ready after $((i * 10))s" && exit 0
            echo "Attempt $i/24: port 22 not yet open, retrying in 10s..."
            sleep 10
          done
          echo "::error::EC2 SSH port 22 never became reachable after 4 minutes"
          exit 1

      - name: Write .env and restart containers
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKERHUB_USERNAME,DB_USER,DB_PASSWORD,JWT_SECRET,FAA_CLIENT_ID,FAA_CLIENT_SECRET,ANTHROPIC_API_KEY,VITE_API_URL,AWS_REGION,APP_URL,SES_FROM_EMAIL
          script: |
            set -e
            # Install Docker + Compose plugin if not already present
            if ! command -v docker &>/dev/null; then
              sudo dnf install -y docker
              sudo systemctl enable --now docker
            fi
            if ! sudo docker compose version &>/dev/null 2>&1; then
              curl -fsSL -o /tmp/docker-compose \
                "https://github.com/docker/compose/releases/download/v2.27.0/docker-compose-linux-x86_64"
              sudo mkdir -p /usr/local/lib/docker/cli-plugins
              sudo install -m 0755 /tmp/docker-compose /usr/local/lib/docker/cli-plugins/docker-compose
            fi
            sudo mkdir -p /opt/skybroe
            sudo tee /opt/skybroe/.env > /dev/null <<EOF
            DB_USER=${DB_USER}
            DB_PASSWORD=${DB_PASSWORD}
            JWT_SECRET=${JWT_SECRET}
            FAA_CLIENT_ID=${FAA_CLIENT_ID}
            FAA_CLIENT_SECRET=${FAA_CLIENT_SECRET}
            ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
            VITE_API_URL=${VITE_API_URL}
            DOCKERHUB_USERNAME=${DOCKERHUB_USERNAME}
            AWS_REGION=${AWS_REGION}
            APP_URL=${APP_URL}
            SES_FROM_EMAIL=${SES_FROM_EMAIL}
            IMAGE_TAG=latest
            EOF
            sudo chmod 600 /opt/skybroe/.env
            sudo tee /opt/skybroe/docker-compose.prod.yml > /dev/null <<'COMPOSE'
            services:
              db:
                image: postgres:16-alpine
                restart: unless-stopped
                environment:
                  POSTGRES_DB: skybroe
                  POSTGRES_USER: ${DB_USER}
                  POSTGRES_PASSWORD: ${DB_PASSWORD}
                volumes:
                  - pgdata:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
                  interval: 10s
                  timeout: 5s
                  retries: 5
              backend:
                image: ${DOCKERHUB_USERNAME}/skybroe-backend:${IMAGE_TAG:-latest}
                restart: unless-stopped
                depends_on:
                  db:
                    condition: service_healthy
                environment:
                  NODE_ENV: production
                  PORT: 3001
                  DB_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/skybroe
                  FAA_CLIENT_ID: ${FAA_CLIENT_ID}
                  FAA_CLIENT_SECRET: ${FAA_CLIENT_SECRET}
                  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
                  JWT_SECRET: ${JWT_SECRET}
                  AWS_REGION: ${AWS_REGION}
                  APP_URL: ${APP_URL}
                  SES_FROM_EMAIL: ${SES_FROM_EMAIL}
                ports:
                  - "3001:3001"
              web:
                image: ${DOCKERHUB_USERNAME}/skybroe-web:${IMAGE_TAG:-latest}
                restart: unless-stopped
                depends_on:
                  - backend
                ports:
                  - "80:8080"
            volumes:
              pgdata:
            COMPOSE
            cd /opt/skybroe
            sudo docker compose -f docker-compose.prod.yml pull
            sudo docker compose -f docker-compose.prod.yml up -d --remove-orphans
            sudo docker image prune -f
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DB_USER:            ${{ secrets.DB_USER }}
          DB_PASSWORD:        ${{ secrets.DB_PASSWORD }}
          JWT_SECRET:         ${{ secrets.JWT_SECRET }}
          FAA_CLIENT_ID:      ${{ secrets.FAA_CLIENT_ID }}
          FAA_CLIENT_SECRET:  ${{ secrets.FAA_CLIENT_SECRET }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          VITE_API_URL:       https://${{ secrets.APP_DOMAIN }}
          AWS_REGION:         ${{ secrets.AWS_REGION || 'us-east-1' }}
          APP_URL:            https://${{ secrets.APP_DOMAIN }}
          SES_FROM_EMAIL:     ${{ secrets.SES_FROM_EMAIL || format('noreply@{0}', secrets.APP_DOMAIN) }}

  # ── 7. Production smoke test ──────────────────────────────────────
  smoke-prod:
    name: Production Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy]

    steps:
      - name: Wait for containers to stabilize
        run: sleep 30

      - name: API health check
        run: |
          curl -sf "https://${{ secrets.APP_DOMAIN }}/health" \
            | jq -e '.status == "ok"' \
            || (echo "::error::API health check failed" && exit 1)

      - name: Web health check
        run: |
          curl -sf "https://${{ secrets.APP_DOMAIN }}/" \
            | grep -qi "<!DOCTYPE html>" \
            || (echo "::error::Web health check failed" && exit 1)

      - name: Weather API smoke test
        run: |
          curl -sf "https://${{ secrets.APP_DOMAIN }}/api/weather/metar?ids=KORD" \
            && echo "Weather API OK" \
            || echo "::warning::Weather API unavailable (external dependency)"

      - name: Airport API smoke test
        run: |
          curl -sf "https://${{ secrets.APP_DOMAIN }}/api/airports?ids=KORD" \
            && echo "Airports API OK" \
            || echo "::warning::Airports API unavailable (external dependency)"

  # ── 8. Summary ────────────────────────────────────────────────────
  summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [build-push, infra-apply, deploy, smoke-prod]
    if: always()

    steps:
      - name: Write summary
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "## SkyBroe Release — \`$SHA\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Push  | ${{ needs.build-push.result }}  |" >> $GITHUB_STEP_SUMMARY
          echo "| Infra Apply   | ${{ needs.infra-apply.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy        | ${{ needs.deploy.result }}      |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Test    | ${{ needs.smoke-prod.result }}  |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Verify signatures" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "cosign verify \\" >> $GITHUB_STEP_SUMMARY
          echo "  --certificate-identity-regexp='https://github.com/${{ github.repository }}' \\" >> $GITHUB_STEP_SUMMARY
