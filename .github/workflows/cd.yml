name: CD — Build · Infra · Deploy

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      push:
        description: 'Push images to Docker Hub'
        type: boolean
        default: true

permissions:
  contents: read
  security-events: write
  id-token: write
  packages: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── 1. Secret scan ────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Run Gitleaks
        run: gitleaks detect --source . --verbose --redact --log-level warn

  # ── 2. SAST ───────────────────────────────────────────────────────
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          if [ -n "$SEMGREP_APP_TOKEN" ]; then
            semgrep ci --sarif --output=semgrep.sarif
          else
            semgrep scan --config=auto --sarif --output=semgrep.sarif
          fi
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ── 3. Dependency audit — stricter in prod ────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Audit backend
        run: cd app/backend && npm ci && npm audit --audit-level=high

      - name: Audit web
        run: cd app/web && npm ci && npm audit --audit-level=high

  # ── 4. Build · push · scan · sign per service ────────────────────
  build-push:
    name: Build · Push · Sign (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [secret-scan, sast, audit]
    strategy:
      fail-fast: false
      matrix:
        service: [backend, web]

    outputs:
      backend-digest: ${{ steps.build.outputs.digest }}
      web-digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/skyops-${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=SkyOps ${{ matrix.service }}
            org.opencontainers.image.description=Aviation tools for GA pilots
            org.opencontainers.image.vendor=SkyOps
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./app/${{ matrix.service }}
          file: ./app/${{ matrix.service }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=${{ matrix.service }}-prod
          cache-to: type=gha,scope=${{ matrix.service }}-prod,mode=max

      - name: Trivy image scan
        id: trivy-image
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/skyops-${{ matrix.service }}@${{ steps.build.outputs.digest }}
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true
          format: sarif
          output: trivy-image-${{ matrix.service }}.sarif

      - name: Ensure image SARIF valid
        if: always()
        run: |
          FILE="trivy-image-${{ matrix.service }}.sarif"
          jq -e '.runs | length > 0' "$FILE" > /dev/null 2>&1 || \
            echo '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"Trivy","version":"0.0.0","informationUri":"https://github.com/aquasecurity/trivy","rules":[]}},"results":[]}]}' > "$FILE"

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image-${{ matrix.service }}.sarif
          category: trivy-image-${{ matrix.service }}

      - name: Warn on scan findings
        if: steps.trivy-image.outcome == 'failure'
        run: echo "::warning::Trivy found vulnerabilities in skyops-${{ matrix.service }}. Review Security → Code scanning."

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless OIDC)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}
        run: |
          cosign sign --yes \
            "${{ secrets.DOCKERHUB_USERNAME }}/skyops-${{ matrix.service }}@${{ steps.build.outputs.digest }}"
        env:
          COSIGN_EXPERIMENTAL: '1'

      - name: Generate SBOM
        uses: anchore/sbom-action@v0.18.0
        continue-on-error: true
        with:
          image: ${{ secrets.DOCKERHUB_USERNAME }}/skyops-${{ matrix.service }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          artifact-name: sbom-${{ matrix.service }}-${{ github.sha }}.spdx.json
          upload-artifact: true
          upload-release-assets: true

  # ── 5. Infra apply — provision / update EC2 ──────────────────────
  infra-apply:
    name: Infra Apply (Terraform)
    runs-on: ubuntu-latest
    needs: [build-push]
    outputs:
      monitor_ip:      ${{ steps.tf-outputs.outputs.monitor_ip }}
      app_private_ip:  ${{ steps.tf-outputs.outputs.app_private_ip }}
    defaults:
      run:
        working-directory: infra/terraform
    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION:    ${{ secrets.AWS_REGION || 'us-east-1' }}
      TF_VAR_dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
      TF_VAR_key_name: keyit
      TF_VAR_domain_name: ${{ secrets.APP_DOMAIN }}
      TF_VAR_hosted_zone_id: ${{ secrets.HOSTED_ZONE_ID }}
      TF_VAR_app_eip: ${{ secrets.EC2_HOST }}
      TF_VAR_monitor_eip: ${{ secrets.MONITOR_HOST }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.8.5'

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" \
            -backend-config="key=ec2/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION || 'us-east-1' }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_BACKEND_DYNAMO_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Clear blackhole default route
        run: |
          REGION="${{ secrets.AWS_REGION || 'us-east-1' }}"
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=isDefault,Values=true" \
            --query "Vpcs[0].VpcId" --output text --region "$REGION")
          RTB_ID=$(aws ec2 describe-route-tables \
            --filters "Name=vpc-id,Values=$VPC_ID" "Name=association.main,Values=true" \
            --query "RouteTables[0].RouteTableId" --output text --region "$REGION")
          aws ec2 delete-route --route-table-id "$RTB_ID" \
            --destination-cidr-block 0.0.0.0/0 --region "$REGION" \
            && echo "Stale route removed" || echo "No conflicting route"

      - name: Import existing AWS resources into state
        run: |
          REGION="${{ secrets.AWS_REGION || 'us-east-1' }}"

          tf_import_if_missing() {
            local resource=$1 id=$2
            if terraform state show "$resource" > /dev/null 2>&1; then
              echo "$resource already in state — skipping import"
            else
              terraform import "$resource" "$id" \
                || echo "Import of $resource failed — may not exist yet"
            fi
          }

          # ── IAM ─────────────────────────────────────────────────
          tf_import_if_missing aws_iam_role.skyops_ec2 skyops-ec2-role
          tf_import_if_missing aws_iam_instance_profile.skyops_ec2 skyops-ec2-profile
          tf_import_if_missing aws_iam_role_policy.ssm_read skyops-ec2-role:skyops-ssm-read

          # ── Security groups ──────────────────────────────────────
          SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=skyops-sg" \
            --query "SecurityGroups[0].GroupId" --output text --region "$REGION" 2>/dev/null || true)
          [ -n "$SG_ID" ] && [ "$SG_ID" != "None" ] && \
            tf_import_if_missing aws_security_group.skyops "$SG_ID"

          MONIT_SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=skyops-monitoring-sg" \
            --query "SecurityGroups[0].GroupId" --output text --region "$REGION" 2>/dev/null || true)
          [ -n "$MONIT_SG_ID" ] && [ "$MONIT_SG_ID" != "None" ] && \
            tf_import_if_missing aws_security_group.monitoring "$MONIT_SG_ID"

          # ── EC2 instances ────────────────────────────────────────
          APP_INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=skyops-app" \
                      "Name=instance-state-name,Values=running,stopped" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text --region "$REGION" 2>/dev/null || true)
          [ -n "$APP_INSTANCE_ID" ] && [ "$APP_INSTANCE_ID" != "None" ] && \
            tf_import_if_missing aws_instance.skyops "$APP_INSTANCE_ID"

          MONIT_INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=skyops-monitoring" \
                      "Name=instance-state-name,Values=running,stopped" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text --region "$REGION" 2>/dev/null || true)
          [ -n "$MONIT_INSTANCE_ID" ] && [ "$MONIT_INSTANCE_ID" != "None" ] && \
            tf_import_if_missing aws_instance.monitoring "$MONIT_INSTANCE_ID"

          # ── EIP associations ─────────────────────────────────────
          APP_ASSOC_ID=$(aws ec2 describe-addresses \
            --filters "Name=public-ip,Values=$TF_VAR_app_eip" \
            --query "Addresses[0].AssociationId" --output text --region "$REGION" 2>/dev/null || true)
          [ -n "$APP_ASSOC_ID" ] && [ "$APP_ASSOC_ID" != "None" ] && \
            tf_import_if_missing aws_eip_association.skyops "$APP_ASSOC_ID"

          MONIT_ASSOC_ID=$(aws ec2 describe-addresses \
            --filters "Name=public-ip,Values=$TF_VAR_monitor_eip" \
            --query "Addresses[0].AssociationId" --output text --region "$REGION" 2>/dev/null || true)
          [ -n "$MONIT_ASSOC_ID" ] && [ "$MONIT_ASSOC_ID" != "None" ] && \
            tf_import_if_missing aws_eip_association.monitoring "$MONIT_ASSOC_ID"

          # ── Remove managed EIPs from state (now data sources) ────
          if terraform state show aws_eip.skyops > /dev/null 2>&1; then
            terraform state rm aws_eip.skyops
            echo "Removed legacy aws_eip.skyops from state"
          fi
          if terraform state show aws_eip.monitoring > /dev/null 2>&1; then
            terraform state rm aws_eip.monitoring
            echo "Removed legacy aws_eip.monitoring from state"
          fi

          # ── Internet gateway ─────────────────────────────────────
          IGW_ID=$(aws ec2 describe-internet-gateways \
            --filters "Name=tag:Name,Values=skyops-igw" \
            --query "InternetGateways[0].InternetGatewayId" --output text --region "$REGION" 2>/dev/null || true)
          [ -n "$IGW_ID" ] && [ "$IGW_ID" != "None" ] && \
            tf_import_if_missing aws_internet_gateway.skyops "$IGW_ID"

      - name: Terraform Plan
        run: terraform plan -out=tfplan -input=false

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false tfplan

      - name: Wait for EC2 instance to pass status checks
        run: |
          REGION="${{ secrets.AWS_REGION || 'us-east-1' }}"
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=skyops-app" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text --region "$REGION")
          echo "Waiting for instance $INSTANCE_ID to pass status checks..."
          aws ec2 wait instance-status-ok --instance-ids "$INSTANCE_ID" --region "$REGION"
          echo "Instance is ready"

      - name: Terraform Outputs
        id: tf-outputs
        run: |
          terraform output
          MONITOR_IP=$(terraform output -raw monitoring_public_ip 2>/dev/null || echo "")
          APP_PRIVATE_IP=$(terraform output -raw app_private_ip 2>/dev/null || echo "")
          echo "monitor_ip=$MONITOR_IP"         >> $GITHUB_OUTPUT
          echo "app_private_ip=$APP_PRIVATE_IP" >> $GITHUB_OUTPUT

      - name: Wait for monitoring EC2 to pass status checks
        run: |
          REGION="${{ secrets.AWS_REGION || 'us-east-1' }}"
          MONITOR_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=skyops-monitoring" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text --region "$REGION")
          if [ -n "$MONITOR_ID" ] && [ "$MONITOR_ID" != "None" ]; then
            echo "Waiting for monitoring instance $MONITOR_ID..."
            aws ec2 wait instance-status-ok --instance-ids "$MONITOR_ID" --region "$REGION"
            echo "Monitoring instance ready"
          fi

  # ── 6. Deploy — write .env + restart containers ──────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [infra-apply]

    steps:
      - name: Wait for SSH to be ready
        run: |
          for i in $(seq 1 24); do
            nc -z -w5 "${{ secrets.EC2_HOST }}" 22 && echo "SSH ready after $((i * 10))s" && exit 0
            echo "Attempt $i/24: port 22 not yet open, retrying in 10s..."
            sleep 10
          done
          echo "::error::EC2 SSH port 22 never became reachable after 4 minutes"
          exit 1

      - name: Write .env and restart containers
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKERHUB_USERNAME,DB_USER,DB_PASSWORD,FAA_CLIENT_ID,FAA_CLIENT_SECRET,VITE_API_URL
          script: |
            set -e
            # Install Docker + Compose plugin if not already present
            if ! command -v docker &>/dev/null; then
              sudo dnf install -y docker
              sudo systemctl enable --now docker
            fi
            if ! sudo docker compose version &>/dev/null 2>&1; then
              curl -fsSL -o /tmp/docker-compose \
                "https://github.com/docker/compose/releases/download/v2.27.0/docker-compose-linux-x86_64"
              sudo mkdir -p /usr/local/lib/docker/cli-plugins
              sudo install -m 0755 /tmp/docker-compose /usr/local/lib/docker/cli-plugins/docker-compose
            fi
            sudo mkdir -p /opt/skyops
            sudo tee /opt/skyops/.env > /dev/null <<EOF
            DB_USER=${DB_USER}
            DB_PASSWORD=${DB_PASSWORD}
            FAA_CLIENT_ID=${FAA_CLIENT_ID}
            FAA_CLIENT_SECRET=${FAA_CLIENT_SECRET}
            VITE_API_URL=${VITE_API_URL}
            DOCKERHUB_USERNAME=${DOCKERHUB_USERNAME}
            IMAGE_TAG=latest
            EOF
            sudo chmod 600 /opt/skyops/.env
            sudo tee /opt/skyops/docker-compose.prod.yml > /dev/null <<'COMPOSE'
            services:
              db:
                image: postgres:16-alpine
                restart: unless-stopped
                environment:
                  POSTGRES_DB: skyops
                  POSTGRES_USER: ${DB_USER}
                  POSTGRES_PASSWORD: ${DB_PASSWORD}
                volumes:
                  - pgdata:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
                  interval: 10s
                  timeout: 5s
                  retries: 5
              backend:
                image: ${DOCKERHUB_USERNAME}/skyops-backend:${IMAGE_TAG:-latest}
                restart: unless-stopped
                depends_on:
                  db:
                    condition: service_healthy
                environment:
                  NODE_ENV: production
                  PORT: 3001
                  DB_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/skyops
                  FAA_CLIENT_ID: ${FAA_CLIENT_ID}
                  FAA_CLIENT_SECRET: ${FAA_CLIENT_SECRET}
                ports:
                  - "3001:3001"
              web:
                image: ${DOCKERHUB_USERNAME}/skyops-web:${IMAGE_TAG:-latest}
                restart: unless-stopped
                depends_on:
                  - backend
                ports:
                  - "80:8080"
            volumes:
              pgdata:
            COMPOSE
            cd /opt/skyops
            sudo docker compose -f docker-compose.prod.yml pull
            sudo docker compose -f docker-compose.prod.yml up -d --remove-orphans
            sudo docker image prune -f
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DB_USER:            ${{ secrets.DB_USER }}
          DB_PASSWORD:        ${{ secrets.DB_PASSWORD }}
          FAA_CLIENT_ID:      ${{ secrets.FAA_CLIENT_ID }}
          FAA_CLIENT_SECRET:  ${{ secrets.FAA_CLIENT_SECRET }}
          VITE_API_URL:       https://${{ secrets.APP_DOMAIN }}

  # ── 7. Deploy exporters to app EC2 ───────────────────────────────
  deploy-exporters:
    name: Deploy Exporters to App EC2
    runs-on: ubuntu-latest
    needs: [deploy, infra-apply]

    steps:
      - uses: actions/checkout@v4

      - name: Upload exporter configs to app EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "infra/docker-compose.exporters.yml"
          target: "/home/ec2-user/"
          overwrite: true

      - name: Start exporters on app EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: MONITOR_IP
          script: |
            set -e
            sudo mkdir -p /opt/exporters
            sudo cp /home/ec2-user/infra/docker-compose.exporters.yml /opt/exporters/docker-compose.yml
            sudo tee /opt/exporters/.env > /dev/null <<EOF
            LOKI_URL=http://${MONITOR_IP}:3100
            EOF
            sudo tee /opt/exporters/promtail-app.yml > /dev/null <<'PROMTAIL'
            server:
              http_listen_port: 9080
              grpc_listen_port: 0
            positions:
              filename: /tmp/positions.yaml
            clients:
              - url: ${LOKI_URL}/loki/api/v1/push
            scrape_configs:
              - job_name: docker
                docker_sd_configs:
                  - host: unix:///var/run/docker.sock
                    refresh_interval: 5s
                    filters:
                      - name: status
                        values: [running]
                relabel_configs:
                  - source_labels: [__meta_docker_container_name]
                    regex: /(.*)
                    target_label: container
                  - source_labels: [__meta_docker_compose_service]
                    target_label: service
                  - source_labels: [__meta_docker_compose_project]
                    target_label: project
                  - source_labels: [__meta_docker_container_log_stream]
                    target_label: logstream
                  - replacement: skyops-app
                    target_label: host
              - job_name: system
                static_configs:
                  - targets: [localhost]
                    labels:
                      job: system
                      host: skyops-app
                      __path__: /var/log/{messages,secure,cloud-init.log}
            PROMTAIL
            # Install Docker if missing
            if ! command -v docker &>/dev/null; then
              sudo dnf install -y docker && sudo systemctl enable --now docker
            fi
            if ! sudo docker compose version &>/dev/null 2>&1; then
              curl -fsSL -o /tmp/docker-compose \
                "https://github.com/docker/compose/releases/download/v2.27.0/docker-compose-linux-x86_64"
              sudo mkdir -p /usr/local/lib/docker/cli-plugins
              sudo install -m 0755 /tmp/docker-compose /usr/local/lib/docker/cli-plugins/docker-compose
            fi
            cd /opt/exporters
            sudo docker compose pull
            sudo docker compose up -d --remove-orphans
        env:
          MONITOR_IP: ${{ secrets.MONITOR_HOST }}

  # ── 8. Deploy monitoring stack to monitoring EC2 ─────────────────
  deploy-monitoring:
    name: Deploy Monitoring Stack to Monitoring EC2
    runs-on: ubuntu-latest
    needs: [deploy-exporters, infra-apply]

    steps:
      - uses: actions/checkout@v4

      - name: Wait for SSH on monitoring EC2
        run: |
          for i in $(seq 1 24); do
            nc -z -w5 "${{ secrets.MONITOR_HOST }}" 22 && echo "SSH ready after $((i * 10))s" && exit 0
            echo "Attempt $i/24: port 22 not yet open, retrying in 10s..."
            sleep 10
          done
          echo "::error::Monitoring EC2 SSH port 22 never became reachable after 4 minutes"
          exit 1

      - name: Upload monitoring configs to monitoring EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.MONITOR_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "monit/"
          target: "/home/ec2-user/"
          overwrite: true

      - name: Start monitoring stack on monitoring EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.MONITOR_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GRAFANA_ADMIN_PASSWORD,APP_PRIVATE_IP,APP_DOMAIN
          script: |
            set -e
            sudo mkdir -p /opt/monit
            sudo cp -r /home/ec2-user/monit/. /opt/monit/
            # .env is read by Docker Compose; placeholders are substituted by the prometheus entrypoint
            sudo tee /opt/monit/.env > /dev/null <<EOF
            GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
            APP_EC2_IP=${APP_PRIVATE_IP}
            APP_DOMAIN=${APP_DOMAIN}
            EOF
            # Install Docker if missing
            if ! command -v docker &>/dev/null; then
              sudo dnf install -y docker && sudo systemctl enable --now docker
            fi
            if ! sudo docker compose version &>/dev/null 2>&1; then
              curl -fsSL -o /tmp/docker-compose \
                "https://github.com/docker/compose/releases/download/v2.27.0/docker-compose-linux-x86_64"
              sudo mkdir -p /usr/local/lib/docker/cli-plugins
              sudo install -m 0755 /tmp/docker-compose /usr/local/lib/docker/cli-plugins/docker-compose
            fi
            cd /opt/monit
            sudo docker compose pull
            sudo docker compose up -d --remove-orphans
            # Reload Prometheus config to pick up any target changes
            sleep 5
            sudo docker compose exec -T prometheus \
              wget -q --post-data='' http://localhost:9090/-/reload -O /dev/null \
              && echo "Prometheus config reloaded" || echo "Reload skipped (first start)"
        env:
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          APP_PRIVATE_IP:         ${{ needs.infra-apply.outputs.app_private_ip }}
          APP_DOMAIN:             ${{ secrets.APP_DOMAIN }}

  # ── 8. Production smoke test ──────────────────────────────────────
  smoke-prod:
    name: Production Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy]

    steps:
      - name: Wait for containers to stabilize
        run: sleep 30

      - name: API health check
        run: |
          curl -sf "https://${{ secrets.APP_DOMAIN }}/health" \
            | jq -e '.status == "ok"' \
            || (echo "::error::API health check failed" && exit 1)

      - name: Web health check
        run: |
          curl -sf "https://${{ secrets.APP_DOMAIN }}/" \
            | grep -qi "<!DOCTYPE html>" \
            || (echo "::error::Web health check failed" && exit 1)

      - name: Weather API smoke test
        run: |
          curl -sf "https://${{ secrets.APP_DOMAIN }}/api/weather/metar?ids=KORD" \
            && echo "Weather API OK" \
            || echo "::warning::Weather API unavailable (external dependency)"

      - name: Airport API smoke test
        run: |
          curl -sf "https://${{ secrets.APP_DOMAIN }}/api/airports?ids=KORD" \
            && echo "Airports API OK" \
            || echo "::warning::Airports API unavailable (external dependency)"

  # ── 8. Summary ────────────────────────────────────────────────────
  summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [build-push, infra-apply, deploy, deploy-exporters, deploy-monitoring, smoke-prod]
    if: always()

    steps:
      - name: Write summary
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "## SkyOps Release — \`$SHA\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Push  | ${{ needs.build-push.result }}  |" >> $GITHUB_STEP_SUMMARY
          echo "| Infra Apply   | ${{ needs.infra-apply.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy        | ${{ needs.deploy.result }}      |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Test    | ${{ needs.smoke-prod.result }}  |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Verify signatures" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "cosign verify \\" >> $GITHUB_STEP_SUMMARY
          echo "  --certificate-identity-regexp='https://github.com/${{ github.repository }}' \\" >> $GITHUB_STEP_SUMMARY
          echo "  --certificate-oidc-issuer='https://token.actions.githubusercontent.com' \\" >> $GITHUB_STEP_SUMMARY
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/skyops-backend:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
