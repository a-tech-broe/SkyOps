name: CI — Gate

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]

permissions:
  contents: read
  security-events: write
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Secret scan ────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Run Gitleaks
        run: gitleaks detect --source . --verbose --redact --log-level warn

  # ── 2. Lint ───────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfiles (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          config: .hadolint.yaml
          failure-threshold: warning
          ignore: "DL3005 DL3008 DL3017 DL3018"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            app/backend/package-lock.json
            app/web/package-lock.json

      - name: Type-check backend
        run: cd app/backend && npm ci && npx tsc --noEmit

      - name: Type-check web
        run: cd app/web && npm ci && npx tsc --noEmit

  # ── 3. Dependency audit ───────────────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Audit backend
        run: |
          cd app/backend && npm ci
          npm audit --audit-level=high --json | tee audit-backend.json || true
          npm audit --audit-level=critical

      - name: Audit web
        run: |
          cd app/web && npm ci
          npm audit --audit-level=high --json | tee audit-web.json || true
          npm audit --audit-level=critical

      - name: Audit mobile
        run: cd app/mobile && npm ci && npm audit --audit-level=critical

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-reports
          path: "**/*.json"
          retention-days: 14

  # ── 4. SAST ───────────────────────────────────────────────────────
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          if [ -n "$SEMGREP_APP_TOKEN" ]; then
            semgrep ci --sarif --output=semgrep.sarif
          else
            semgrep scan --config=auto --sarif --output=semgrep.sarif
          fi
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ── 5. Build + CVE scan per service ──────────────────────────────
  build-and-scan:
    name: Build & Scan (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [lint, audit]
    strategy:
      fail-fast: false
      matrix:
        service: [backend, web]

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./app/${{ matrix.service }}
          file: ./app/${{ matrix.service }}/Dockerfile
          push: false
          load: true
          tags: skyops-${{ matrix.service }}:ci
          cache-from: type=gha,scope=${{ matrix.service }}-ci
          cache-to: type=gha,scope=${{ matrix.service }}-ci,mode=max
          build-args: VITE_API_URL=http://localhost:3001

      - name: Trivy FS scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: ./app/${{ matrix.service }}
          severity: CRITICAL,HIGH
          exit-code: '0'
          format: sarif
          output: trivy-fs-${{ matrix.service }}.sarif

      - name: Ensure FS SARIF valid
        if: always()
        run: |
          FILE="trivy-fs-${{ matrix.service }}.sarif"
          jq -e '.runs | length > 0' "$FILE" > /dev/null 2>&1 || \
            echo '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"Trivy","version":"0.0.0","informationUri":"https://github.com/aquasecurity/trivy","rules":[]}},"results":[]}]}' > "$FILE"

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs-${{ matrix.service }}.sarif
          category: trivy-fs-${{ matrix.service }}

      - name: Trivy image scan
        id: trivy-image
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: skyops-${{ matrix.service }}:ci
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true
          format: sarif
          output: trivy-image-${{ matrix.service }}.sarif

      - name: Ensure image SARIF valid
        if: always()
        run: |
          FILE="trivy-image-${{ matrix.service }}.sarif"
          jq -e '.runs | length > 0' "$FILE" > /dev/null 2>&1 || \
            echo '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"Trivy","version":"0.0.0","informationUri":"https://github.com/aquasecurity/trivy","rules":[]}},"results":[]}]}' > "$FILE"

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image-${{ matrix.service }}.sarif
          category: trivy-image-${{ matrix.service }}

      - name: Warn on scan findings
        if: steps.trivy-image.outcome == 'failure'
        run: echo "::warning::Trivy found vulnerabilities in skyops-${{ matrix.service }}. Review Security → Code scanning."

      - name: Tombstone retired trivy-prod category
        if: always()
        run: |
          echo '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"Trivy","version":"0.0.0","informationUri":"https://github.com/aquasecurity/trivy","rules":[]}},"results":[]}]}' \
            > trivy-prod-${{ matrix.service }}.sarif

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-prod-${{ matrix.service }}.sarif
          category: trivy-prod-${{ matrix.service }}

  # ── 6. Infra plan — preview only, PR branch ──────────────────────
  infra-plan:
    name: Infra Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [secret-scan]
    defaults:
      run:
        working-directory: infra/terraform
    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION:    ${{ secrets.AWS_REGION || 'us-east-1' }}
      TF_VAR_dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
      TF_VAR_key_name: keyit
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.8.5'

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" \
            -backend-config="key=ec2/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION || 'us-east-1' }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_BACKEND_DYNAMO_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false
