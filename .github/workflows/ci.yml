name: CI — Lint · Scan · Build

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]

permissions:
  contents: read
  security-events: write   # upload SARIF to GitHub Security tab
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # 1. SECRET SCANNING — block commits with creds
  # ──────────────────────────────────────────────
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for delta scanning

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Run Gitleaks
        run: gitleaks detect --source . --verbose --redact --log-level warn

  # ──────────────────────────────────────────────
  # 2. LINT — TypeScript + Dockerfile hygiene
  # ──────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfiles (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          config: .hadolint.yaml
          failure-threshold: warning

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Type-check backend
        run: |
          cd backend
          npm install --prefer-offline
          npx tsc --noEmit

      - name: Type-check web
        run: |
          cd web
          npm install --prefer-offline
          npx tsc --noEmit

  # ──────────────────────────────────────────────
  # 3. DEPENDENCY AUDIT — known CVEs in packages
  # ──────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit backend
        run: |
          cd backend
          npm install --prefer-offline
          npm audit --audit-level=high --json | tee audit-backend.json || true
          npm audit --audit-level=critical

      - name: Audit web
        run: |
          cd web
          npm install --prefer-offline
          npm audit --audit-level=high --json | tee audit-web.json || true
          npm audit --audit-level=critical

      - name: Audit mobile
        run: |
          cd mobile
          npm install --prefer-offline
          npm audit --audit-level=critical

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-reports
          path: "**/*.json"
          retention-days: 30

  # ──────────────────────────────────────────────
  # 4. SAST — static analysis
  # ──────────────────────────────────────────────
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          if [ -n "$SEMGREP_APP_TOKEN" ]; then
            semgrep ci --sarif --output=semgrep.sarif
          else
            semgrep scan --config=auto --sarif --output=semgrep.sarif
          fi
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ──────────────────────────────────────────────
  # 5. BUILD + IMAGE SCAN — CVE gate
  # ──────────────────────────────────────────────
  build-and-scan:
    name: Build & Trivy Scan (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [lint, dependency-audit]
    strategy:
      fail-fast: false
      matrix:
        service: [backend, web]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: false
          load: true
          tags: skyops-${{ matrix.service }}:ci
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

      - name: Verify image loaded into Docker
        run: docker image inspect skyops-${{ matrix.service }}:ci --format '{{.Id}}'

      # Filesystem scan (source + deps) — warn only, never blocks
      - name: Trivy FS scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: ./${{ matrix.service }}
          severity: CRITICAL,HIGH
          exit-code: '0'
          format: sarif
          output: trivy-fs-${{ matrix.service }}.sarif

      - name: Ensure FS SARIF has valid run
        if: always()
        run: |
          FILE="trivy-fs-${{ matrix.service }}.sarif"
          if [ ! -f "$FILE" ] || ! jq -e '.runs | length > 0' "$FILE" > /dev/null 2>&1; then
            echo '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"Trivy","version":"0.0.0","informationUri":"https://github.com/aquasecurity/trivy","rules":[]}},"results":[]}]}' > "$FILE"
          fi

      - name: Upload FS SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs-${{ matrix.service }}.sarif
          category: trivy-fs-${{ matrix.service }}

      # Image scan — CRITICAL CVEs block the build
      - name: Trivy image scan
        id: trivy-image
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: skyops-${{ matrix.service }}:ci
          severity: CRITICAL
          exit-code: '1'
          format: sarif
          output: trivy-image-${{ matrix.service }}.sarif

      - name: Ensure image SARIF has valid run
        if: always()
        run: |
          FILE="trivy-image-${{ matrix.service }}.sarif"
          if [ ! -f "$FILE" ] || ! jq -e '.runs | length > 0' "$FILE" > /dev/null 2>&1; then
            echo '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"Trivy","version":"0.0.0","informationUri":"https://github.com/aquasecurity/trivy","rules":[]}},"results":[]}]}' > "$FILE"
          fi

      - name: Upload image SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image-${{ matrix.service }}.sarif
          category: trivy-image-${{ matrix.service }}

      # Explicit gate — runs after SARIF is safely uploaded
      - name: Enforce image scan gate
        if: steps.trivy-image.outcome == 'failure'
        run: |
          echo "::error::Trivy found CRITICAL vulnerabilities in skyops-${{ matrix.service }}. Check the Security tab for details."
          exit 1
