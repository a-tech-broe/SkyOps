name: Infra — Terraform EC2

on:
  push:
    branches: [main]
    paths:
      - 'infra/terraform/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action'
        type: choice
        options: [plan, apply, destroy]
        default: plan

permissions:
  contents: read

env:
  TF_VERSION: '1.8.5'
  WORKING_DIR: infra/terraform

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action || 'apply' }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION:    ${{ secrets.AWS_REGION || 'us-east-1' }}
      TF_VAR_dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
      TF_VAR_key_name:       keyit

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init (S3 backend)
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" \
            -backend-config="key=ec2/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION || 'us-east-1' }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_BACKEND_DYNAMO_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      # Remove any blackhole 0.0.0.0/0 route from the default VPC route table.
      # A blackhole appears when a previous IGW was deleted without removing its route.
      # Terraform cannot create aws_route.internet while a conflicting route exists.
      - name: Clear blackhole route (if present)
        if: github.event.inputs.action != 'destroy'
        run: |
          REGION="${{ secrets.AWS_REGION || 'us-east-1' }}"
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=isDefault,Values=true" \
            --query "Vpcs[0].VpcId" --output text --region "$REGION")
          RTB_ID=$(aws ec2 describe-route-tables \
            --filters "Name=vpc-id,Values=$VPC_ID" "Name=association.main,Values=true" \
            --query "RouteTables[0].RouteTableId" --output text --region "$REGION")
          echo "Default route table: $RTB_ID"
          aws ec2 delete-route \
            --route-table-id "$RTB_ID" \
            --destination-cidr-block 0.0.0.0/0 \
            --region "$REGION" && echo "Blackhole route removed" || echo "No route to remove"

      # Import resources that may already exist in AWS but not in state.
      # '|| true' makes each import a no-op if the resource is already tracked.
      - name: Import existing resources (if any)
        if: github.event.inputs.action != 'destroy'
        run: |
          REGION="${{ secrets.AWS_REGION || 'us-east-1' }}"

          # IAM role
          terraform import aws_iam_role.skyops_ec2 skyops-ec2-role 2>/dev/null || true

          # IAM instance profile
          terraform import aws_iam_instance_profile.skyops_ec2 skyops-ec2-profile 2>/dev/null || true

          # IAM inline policy
          terraform import aws_iam_role_policy.ssm_read skyops-ec2-role:skyops-ssm-read 2>/dev/null || true

          # Security group — look up by name in the default VPC
          SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=skyops-sg" \
            --query "SecurityGroups[0].GroupId" \
            --output text --region "$REGION" 2>/dev/null || true)
          if [ -n "$SG_ID" ] && [ "$SG_ID" != "None" ]; then
            terraform import aws_security_group.skyops "$SG_ID" 2>/dev/null || true
          fi

          # EIP — look up by allocation ID tag Name=skyops-eip
          EIP_ID=$(aws ec2 describe-addresses \
            --filters "Name=tag:Name,Values=skyops-eip" \
            --query "Addresses[0].AllocationId" \
            --output text --region "$REGION" 2>/dev/null || true)
          if [ -n "$EIP_ID" ] && [ "$EIP_ID" != "None" ]; then
            terraform import aws_eip.skyops "$EIP_ID" 2>/dev/null || true
          fi

          # Internet Gateway — look up by tag Name=skyops-igw
          IGW_ID=$(aws ec2 describe-internet-gateways \
            --filters "Name=tag:Name,Values=skyops-igw" \
            --query "InternetGateways[0].InternetGatewayId" \
            --output text --region "$REGION" 2>/dev/null || true)
          if [ -n "$IGW_ID" ] && [ "$IGW_ID" != "None" ]; then
            terraform import aws_internet_gateway.skyops "$IGW_ID" 2>/dev/null || true
          fi

      - name: Terraform Plan
        id: plan
        run: terraform plan -out=tfplan -input=false
        continue-on-error: ${{ github.event.inputs.action == 'destroy' }}

      - name: Terraform Apply
        if: |
          (github.event_name == 'push' || github.event.inputs.action == 'apply') &&
          steps.plan.outcome == 'success'
        run: terraform apply -auto-approve -input=false tfplan

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve -input=false

      - name: Output EC2 details
        if: steps.plan.outcome == 'success' && github.event.inputs.action != 'destroy'
        run: terraform output
