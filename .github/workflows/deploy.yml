name: Deploy — EC2

on:
  workflow_run:
    workflows: ["CD — Build · Scan · Sign · Push"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    name: Roll out to EC2
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Write .env and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKERHUB_USERNAME,DB_USER,DB_PASSWORD,FAA_CLIENT_ID,FAA_CLIENT_SECRET,VITE_API_URL
          script: |
            mkdir -p /opt/skyops

            # Write .env from GitHub Secrets (overwritten on every deploy)
            cat > /opt/skyops/.env <<EOF
            DB_USER=${DB_USER}
            DB_PASSWORD=${DB_PASSWORD}
            FAA_CLIENT_ID=${FAA_CLIENT_ID}
            FAA_CLIENT_SECRET=${FAA_CLIENT_SECRET}
            VITE_API_URL=${VITE_API_URL}
            DOCKERHUB_USERNAME=${DOCKERHUB_USERNAME}
            IMAGE_TAG=latest
            EOF

            cd /opt/skyops
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DB_USER:             ${{ secrets.DB_USER }}
          DB_PASSWORD:         ${{ secrets.DB_PASSWORD }}
          FAA_CLIENT_ID:       ${{ secrets.FAA_CLIENT_ID }}
          FAA_CLIENT_SECRET:   ${{ secrets.FAA_CLIENT_SECRET }}
          VITE_API_URL:        http://${{ secrets.EC2_HOST }}:3001

      - name: Write deploy summary
        run: |
          echo "## EC2 Deploy — ${{ github.event.workflow_run.head_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Host: \`${{ secrets.EC2_HOST }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Images pulled and containers restarted." >> $GITHUB_STEP_SUMMARY
